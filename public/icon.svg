<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#2d2217" />
      <stop offset="100%" stop-color="#120c08" />
    </radialGradient>
    
    <!-- Gold Foil Gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe29d" />
      <stop offset="30%" stop-color="#f59e0b" />
      <stop offset="70%" stop-color="#d97706" />
      <stop offset="100%" stop-color="#78350f" />
    </linearGradient>

    <!-- Soundwave Glow Gradient -->
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="1" />
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0.2" />
    </linearGradient>
  </defs>

  <!-- Base Smooth Rounded Background (PWA safe) -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)" />
  <rect width="496" height="496" x="8" y="8" rx="104" fill="none" stroke="url(#goldGrad)" stroke-width="4" stroke-opacity="0.15" />

  <!-- Elegant Soundwaves bouncing from the book -->
  <g transform="translate(0, -10)">
    <!-- Main Book Visual -->
    <path d="M140,320 C180,300 230,310 256,330 C282,310 332,300 372,320 L372,160 C332,140 282,150 256,170 C230,150 180,140 140,160 Z" 
          fill="none" 
          stroke="url(#goldGrad)" 
          stroke-width="18" 
          stroke-linecap="round" 
          stroke-linejoin="round" />
          
    <!-- Book Center Spine divider -->
    <line x1="256" y1="174" x2="256" y2="332" stroke="url(#goldGrad)" stroke-width="12" stroke-linecap="round" />

    <!-- Left hand lines (representing classic text rows) -->
    <path d="M170,200 C190,195 215,198 230,205" stroke="url(#goldGrad)" stroke-width="8" stroke-linecap="round" stroke-opacity="0.75" />
    <path d="M170,235 C190,230 215,233 230,240" stroke="url(#goldGrad)" stroke-width="8" stroke-linecap="round" stroke-opacity="0.75" />
    <path d="M170,270 C190,265 215,268 230,275" stroke="url(#goldGrad)" stroke-width="8" stroke-linecap="round" stroke-opacity="0.75" />

    <!-- Right hand lines (representing classic text rows) -->
    <path d="M342,200 C322,195 297,198 282,205" stroke="url(#goldGrad)" stroke-width="8" stroke-linecap="round" stroke-opacity="0.75" />
    <path d="M342,235 C322,230 297,233 282,240" stroke="url(#goldGrad)" stroke-width="8" stroke-linecap="round" stroke-opacity="0.75" />
    <path d="M342,270 C322,265 297,268 282,275" stroke="url(#goldGrad)" stroke-width="8" stroke-linecap="round" stroke-opacity="0.75" />

    <!-- Sound Waves rising out of the pages -->
    <!-- Wave 1 (Inner) -->
    <path d="M210,130 C230,115 282,115 302,130" fill="none" stroke="url(#glowGrad)" stroke-width="10" stroke-linecap="round" />
    <!-- Wave 2 (Middle) -->
    <path d="M180,105 C215,80 297,80 332,105" fill="none" stroke="url(#glowGrad)" stroke-width="12" stroke-linecap="round" stroke-opacity="0.8" />
    <!-- Wave 3 (Outer) -->
    <path d="M150,80 C200,45 312,45 362,80" fill="none" stroke="url(#glowGrad)" stroke-width="14" stroke-linecap="round" stroke-opacity="0.5" />
  </g>

  <!-- Small Elegant Headset symbol at the bottom -->
  <path d="M200,380 C200,360 312,360 312,380 L320,405 C320,412 312,420 302,420 L292,420 C285,420 280,412 280,405 L280,390" 
        fill="none" 
        stroke="url(#goldGrad)" 
        stroke-width="8" 
        stroke-linecap="round" 
        stroke-opacity="0.6"/>
</svg>
