<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Liseuse Vocale Multilingue</title>
    
    <!-- PWA & Mobile Web App Meta Tags -->
    <meta name="theme-color" content="#1c1917" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Liseuse Vocale" />
    
    <!-- Favicon & PWA App Manifest -->
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <link rel="manifest" href="/manifest.json" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Register PWA Service Worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((registration) => {
              console.log('[PWA] Service Worker enregistré avec succès pour le scope :', registration.scope);
            })
            .catch((error) => {
              console.error('[PWA] Échec de l\'enregistrement du Service Worker :', error);
            });
        });
      }
    </script>
  </body>
</html>
